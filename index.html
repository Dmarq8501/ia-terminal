<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA TERMINAL | v15.1 LIVE</title>
    <style>
        :root { --red: #ff0000; --bg: #050505; --panel: rgba(20, 0, 0, 0.94); }
        body { color: #eee; font-family: 'Courier New', Courier, monospace; margin: 0; background-color: var(--bg); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://r2.erweima.ai/i/1723145415712771509.png'); background-size: cover; background-position: center; opacity: 0.2; z-index: -2; }
        
        #login-screen { align-self: center; text-align: center; border: 2px solid var(--red); padding: 40px 20px; background: var(--panel); width: 85%; max-width: 380px; box-shadow: 0 0 25px var(--red); z-index: 10; border-radius: 10px; }
        #login-screen input { background: black; border: 1px solid var(--red); color: var(--red); padding: 15px; width: 100%; margin-top: 25px; text-align: center; box-sizing: border-box; font-size: 16px; outline: none; }
        #login-screen button { background: var(--red); color: black; border: none; padding: 12px; margin-top: 20px; cursor: pointer; font-weight: bold; width: 100%; }
        
        #main-interface { display: none; width: 100%; max-width: 950px; padding: 20px; box-sizing: border-box; }
        header { border-bottom: 2px solid var(--red); padding: 15px; text-align: center; margin-bottom: 25px; background: rgba(0,0,0,0.7); }
        
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .category-box { background: var(--panel); border: 1px solid var(--red); padding: 25px 10px; text-align: center; cursor: pointer; transition: 0.3s; border-radius: 5px; }
        .category-box:hover { background: var(--red); color: black; box-shadow: 0 0 20px var(--red); }
        .category-box h3 { margin: 10px 0 0 0; font-size: 14px; }

        #display-area { display: none; background: #000; border: 2px solid var(--red); padding: 20px; position: relative; box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); margin-top: 10px; min-height: 400px; }
        .close-btn { position: absolute; top: 5px; left: 5px; color: var(--red); cursor: pointer; border: 1px solid var(--red); padding: 4px 10px; font-size: 12px; background: #000; z-index: 100; }
        
        input, textarea, select { width: 100%; background: #0a0a0a; border: 1px solid #444; color: white; padding: 12px; margin-bottom: 12px; box-sizing: border-box; font-family: inherit; }
        .action-btn { background: var(--red); color: black; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        th { background: var(--red); color: black; padding: 8px; }
        td { border: 1px solid #333; padding: 10px; text-align: center; word-break: break-all; }
        
        .admin-only { display: none; }
        .wanted-img { width: 60px; height: 60px; object-fit: cover; border: 2px solid var(--red); border-radius: 5px; }
        .report-card { border: 1px solid #333; padding: 15px; margin-bottom: 15px; background: #080000; }
        .tab-btn { padding: 10px; background: #222; border: 1px solid var(--red); color: white; cursor: pointer; margin-left: 5px; }
        .tab-btn.active { background: var(--red); color: black; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: var(--red); margin:0;">FEDERAL AUTHENTICATION</h2>
        <input type="password" id="pass-input" placeholder="ACCESS CODE">
        <button onclick="checkPass()">LOGIN</button>
    </div>

    <div id="main-interface">
        <header>
            <h1 style="margin:0; color:var(--red); font-size: 18px;">INTELLIGENCE AGENCY TERMINAL</h1>
            <div id="auth-status" style="font-size: 10px; color: #00ff00;" class="blink"></div>
        </header>

        <div class="grid-container">
            <div class="category-box" onclick="showContent('ops')">⚔️<h3>العمليات</h3></div>
            <div class="category-box" onclick="showContent('wanted')">🚨<h3>المطلوبين</h3></div>
            <div class="category-box admin-only" onclick="showContent('agents')">🎖️<h3>العملاء</h3></div>
            <div class="category-box" onclick="showContent('intel')">🕵️<h3>المخبرين</h3></div>
            <div class="category-box" onclick="showContent('reports')">📄<h3>التقارير</h3></div>
            <div class="category-box" onclick="showContent('map')">📍<h3>الخريطة</h3></div> 
            <div class="category-box admin-only" onclick="showContent('logs')">📊<h3>سجل الدخول</h3></div>
            <div class="category-box" style="grid-column: span 2;" onclick="showContent('alerts')">⚠️<h3>التنبيهات</h3></div>
        </div>

        <div id="display-area">
            <span class="close-btn" onclick="closeDisplay()">إغلاق [X]</span>
            <div id="content-body"></div>
        </div>
    </div>

    <script>
        let role = 'user';
        let currentUser = "";
        const adminPass = "65554874";
        const userPasses = ["User1", "User2", "User3", "User4", "User5", "User6", "User7", "User8", "User9", "User10"];

        function checkPass() {
            const val = document.getElementById('pass-input').value;
            if (val === adminPass) { role = 'admin'; currentUser = "DIRECTOR"; startSystem(currentUser); }
            else if (userPasses.includes(val)) { role = 'user'; currentUser = val; logAccess(val); startSystem("AGENT: " + val); }
            else { alert("ACCESS DENIED"); }
        }

        function logAccess(u) {
            let logs = JSON.parse(localStorage.getItem('fbi_logs') || '[]');
            logs.unshift({ u, t: new Date().toLocaleString('ar-EG') });
            localStorage.setItem('fbi_logs', JSON.stringify(logs));
        }

        function startSystem(msg) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            document.getElementById('auth-status').innerText = "● SYSTEM ACTIVE | " + msg;
            if(role === 'admin') document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
        }

        function closeDisplay() { document.getElementById('display-area').style.display = "none"; }

        function showContent(type) {
            const area = document.getElementById('display-area');
            const body = document.getElementById('content-body');
            area.style.display = "block";
            body.innerHTML = "";
            
            if(type === 'ops') renderOps(body);
            else if(type === 'wanted') renderWanted(body);
            else if(type === 'reports') renderReports(body);
            else if(type === 'map') renderMap(body);
            else if(type === 'intel') renderIntel(body);
            else if(type === 'agents') renderAgents(body);
            else if(type === 'alerts') renderAlerts(body);
            else if(type === 'logs') renderLogs(body);
            
            window.scrollTo({ top: area.offsetTop, behavior: 'smooth' });
        }

‎        // --- العمليات ---
        function renderOps(container) {
            const data = JSON.parse(localStorage.getItem('ops_db_v3') || '[]');
            let html = `<h3>⚔️ إدارة العمليات الميدانية</h3>`;
            if(role === 'admin') {
                html += `<input id="o-n" placeholder="اسم العملية"><select id="o-t">
                            <option value="current">عملية حالية</option>
                            <option value="upcoming">عملية قادمة</option>
                            <option value="previous">عملية سابقة</option>
                         </select><button class="action-btn" onclick="addOp()">تنشيط</button>`;
            }
            html += `<div style="margin:10px 0;">
                <button class="tab-btn active" onclick="filterOps('all', this)">الكل</button>
                <button class="tab-btn" onclick="filterOps('current', this)">حالية</button>
                <button class="tab-btn" onclick="filterOps('upcoming', this)">قادمة</button>
                <button class="tab-btn" onclick="filterOps('previous', this)">سابقة</button>
            </div><table id="ops-table"><thead><tr><th>العملية</th><th>الحالة</th>${role==='admin'?'<th>X</th>':''}</tr></thead><tbody>`;
            
            data.forEach((d, i) => {
                const statusMap = {current:'حالية', upcoming:'قادمة', previous:'سابقة'};
                html += `<tr class="op-row" data-type="${d.t}"><td>${d.n}</td><td>${statusMap[d.t]}</td>${role==='admin'?`<td><button onclick="del('ops_db_v3',${i},'ops')">حذف</button></td>`:''}</tr>`;
            });
            container.innerHTML = html + "</tbody></table>";
        }

        function addOp() {
            const n=document.getElementById('o-n').value, t=document.getElementById('o-t').value;
            if(!n) return;
            let db = JSON.parse(localStorage.getItem('ops_db_v3') || '[]');
            db.push({n, t}); localStorage.setItem('ops_db_v3', JSON.stringify(db)); 
            showContent('ops'); // تحديث فوري
        }

        function filterOps(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.op-row').forEach(row => {
                row.style.display = (type === 'all' || row.getAttribute('data-type') === type) ? '' : 'none';
            });
        }

‎        // --- المطلوبين ---
        function renderWanted(container) {
            let html = `<h3>🚨 قائمة المطلوبين للعدالة</h3>`;
            if(role === 'admin') {
                html += `<input id="w-n" placeholder="اسم المجرم">
                         <input id="w-s" placeholder="الحالة (خطر جداً/مطلوب حياً)">
                         <input id="w-i" placeholder="رابط صورة المجرم (URL)">
                         <button class="action-btn" onclick="addWanted()">إضافة للقائمة</button>`;
            }
            html += `<table><thead><tr><th>الصورة</th><th>الاسم</th><th>الحالة</th>${role==='admin'?'<th>X</th>':''}</tr></thead><tbody>`;
            const data = JSON.parse(localStorage.getItem('wanted_db_v3') || '[]');
            data.forEach((d, i) => {
                html += `<tr>
                    <td><img src="${d.img || 'https://via.placeholder.com/60/222/ff0000?text=NO+IMG'}" class="wanted-img"></td>
                    <td>${d.n}</td><td>${d.s}</td>
                    ${role==='admin'?`<td><button onclick="del('wanted_db_v3',${i},'wanted')">حذف</button></td>`:''}
                </tr>`;
            });
            container.innerHTML = html + "</tbody></table>";
        }

        function addWanted() {
            const n=document.getElementById('w-n').value, s=document.getElementById('w-s').value, img=document.getElementById('w-i').value;
            if(!n) return;
            let db = JSON.parse(localStorage.getItem('wanted_db_v3') || '[]');
            db.push({n, s, img}); localStorage.setItem('wanted_db_v3', JSON.stringify(db)); 
            showContent('wanted'); // تحديث فوري
        }

‎        // --- التقارير ---
        function renderReports(container) {
            const data = JSON.parse(localStorage.getItem('rep_db_v3') || '[]');
            let html = `<h3>📄 أرشيف التقارير السرية</h3>
                <input id="r-num" placeholder="رقم التقرير (مثلاً #FBI-102)">
                <textarea id="r-body" placeholder="محتوى التقرير التفصيلي..."></textarea>
                <button class="action-btn" onclick="addReport()">بث التقرير للأرشيف</button>`;
            
            data.forEach((r, i) => {
                html += `<div class="report-card">
                    <small style="color:red; font-weight:bold;">الرقم التسلسلي: ${r.num}</small><br>
                    <small style="color:#00ff00;">بواسطة: ${r.author}</small> | <small style="color:#666;">${r.date}</small>
                    <p style="margin-top:10px; border-top:1px dashed #333; padding-top:10px;">${r.text}</p>
                    ${role === 'admin' ? `<button style="background:none; color:red; border:1px solid red; cursor:pointer;" onclick="del('rep_db_v3',${i},'reports')">حذف</button>` : ''}
                </div>`;
            });
            container.innerHTML = html;
        }

        function addReport() {
            const num=document.getElementById('r-num').value, text=document.getElementById('r-body').value;
            if(!num || !text) return;
            let db = JSON.parse(localStorage.getItem('rep_db_v3') || '[]');
            db.unshift({ num, text, author: currentUser, date: new Date().toLocaleString('ar-EG') });
            localStorage.setItem('rep_db_v3', JSON.stringify(db)); 
            showContent('reports'); // تحديث فوري
        }

‎        // --- وظائف عامة ---
        function del(key, i, type) {
            if(role !== 'admin') { alert("غير مصرح لك"); return; }
            let db = JSON.parse(localStorage.getItem(key));
            db.splice(i, 1); 
            localStorage.setItem(key, JSON.stringify(db)); 
            showContent(type); // تحديث القائمة فوراً بعد الحذف
        }

        function renderIntel(container) {
            const data = JSON.parse(localStorage.getItem('intel_db') || '[]');
            let html = `<h3>🕵️ قاعدة المخبرين</h3>`;
            if(role === 'admin') html += `<input id="i-n" placeholder="الاسم"><input id="i-p" placeholder="الهاتف"><button class="action-btn" onclick="addIntel()">تسجيل</button>`;
            html += `<table><thead><tr><th>الاسم</th><th>الهاتف</th>${role==='admin'?'<th>X</th>':''}</tr></thead><tbody>`;
            data.forEach((d, i) => html += `<tr><td>${d.n}</td><td>${d.p}</td>${role==='admin'?`<td><button onclick="del('intel_db',${i},'intel')">حذف</button></td>`:''}</tr>`);
            container.innerHTML = html + "</tbody></table>";
        }
        function addIntel() {
            const n=document.getElementById('i-n').value, p=document.getElementById('i-p').value;
            if(!n) return;
            let db = JSON.parse(localStorage.getItem('intel_db') || '[]');
            db.push({n, p}); localStorage.setItem('intel_db', JSON.stringify(db)); 
            showContent('intel');
        }

        function renderAgents(c) {
            const d = JSON.parse(localStorage.getItem('age_db') || '[]');
            let h = `<h3>🎖️ العملاء</h3><input id="an" placeholder="الاسم"><input id="ac" placeholder="الكود"><button class="action-btn" onclick="addAgent()">إضافة</button><table><tr><th>الاسم</th><th>الكود</th><th>X</th></tr>`;
            d.forEach((x, i) => h += `<tr><td>${x.n}</td><td>${x.c}</td><td><button onclick="del('age_db',${i},'agents')">X</button></td></tr>`);
            c.innerHTML = h + "</table>";
        }
        function addAgent() {
            const n=document.getElementById('an').value, c=document.getElementById('ac').value;
            if(!n) return;
            let db = JSON.parse(localStorage.getItem('age_db') || '[]');
            db.push({n, c}); localStorage.setItem('age_db', JSON.stringify(db)); 
            showContent('agents');
        }

        function renderAlerts(c) {
            const d = JSON.parse(localStorage.getItem('alt_db') || '[]');
            let h = `<h3>⚠️ التنبيهات</h3>${role==='admin'?`<textarea id="ai"></textarea><button class="action-btn" onclick="saveData('alt_db','ai','alerts')">إرسال</button>`:''}`;
            d.forEach((x, i) => h += `<div style="border-left:3px solid red; padding:10px; margin:10px 0; background:#110000; position:relative;">
                <p>${x.text}</p><small>${x.date}</small>
                ${role==='admin'?`<button style="color:red; background:none; border:none; cursor:pointer;" onclick="del('alt_db',${i},'alerts')">[حذف]</button>`:''}
            </div>`);
            c.innerHTML = h;
        }

        function saveData(key, id, type) {
            const v = document.getElementById(id).value; if(!v) return;
            let db = JSON.parse(localStorage.getItem(key) || '[]');
            db.unshift({text: v, date: new Date().toLocaleString('ar-EG')});
            localStorage.setItem(key, JSON.stringify(db)); 
            showContent(type);
        }

        function renderMap(container) {
            container.innerHTML = `<div style="position: relative; width: 100%; height: 550px; border: 2px solid var(--red); background: #000;">
            <iframe src="https://gta-5-map.com" style="width: 100%; height: 100%; border: none;"></iframe></div>`;
        }

        function renderLogs(c) {
            const d = JSON.parse(localStorage.getItem('fbi_logs') || '[]');
            let h = `<h3>📊 سجل الدخول</h3>${role==='admin'?`<button class="action-btn" onclick="localStorage.removeItem('fbi_logs'); showContent('logs')">مسح السجل</button>`:''}`;
            d.forEach(x => h += `<div style="border-bottom:1px solid #222; padding:8px;">AGENT: ${x.u} | TIME: ${x.t}</div>`);
            c.innerHTML = h;
        }
    </script>
</body>
</html>
